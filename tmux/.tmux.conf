# ========== Basic =============
# prefixсЂФctrl+jсѓњУеГт«џ
 unbind C-b
 set -g prefix C-j
 bind -n C-j send-prefix
# defaultсЂ«terminalсѓњzshсЂФУеГт«џ
set-option -g default-shell /bin/zsh


set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# prefix+r сЂДУеГт«џсЂ«сЃфсЃГсЃ╝сЃЅ
bind r source-file ~/.tmux.conf \; display ".tmux.conf Reloaded!"

# history-limitсЂ«СИіжЎљуиЕтњї
set-option -g history-limit 5000

# =========== Status Bar (gruber-darker) =============
set -g status-position top
set -g status-right-length 100
set -g pane-border-status top # paneсЂ«уЋфтЈисЂетљЇтЅЇсѓњУАеуц║

# gruber-darker colors
# bg: #181818, bg+1: #282828, fg: #e4e4ef
# niagara: #96a6c8, green: #73c936, red: #f43841
# yellow: #ffdd33, brown: #cc8c3c, wisteria: #9e95c7

set -g status-style "bg=#282828,fg=#e4e4ef"
set -g status-left "#[bg=#96a6c8,fg=#181818,bold] #S #[bg=#282828] "
set -g status-left-length 30
set -g status-right "#{?client_prefix,#[bg=#f43841]#[fg=#e4e4ef,bold] PREFIX ,#[bg=#73c936]#[fg=#181818,bold] NORMAL }"

# window status
set -g window-status-format "#[fg=#95a99f] #I:#W "
set -g window-status-current-format "#[bg=#181818,fg=#ffdd33,bold] #I:#W "
set -g window-status-separator ""

# pane border
set -g pane-border-style "fg=#484848"
set -g pane-active-border-style "fg=#96a6c8"
set -g pane-border-format "#[fg=#96a6c8] #{pane_index}: #{?pane_title,#{pane_title},#{pane_current_command}} "

# message & command line
set -g message-style "bg=#282828,fg=#ffdd33"
set -g message-command-style "bg=#282828,fg=#e4e4ef"

# clock
set -g clock-mode-colour "#96a6c8"
# =========== Pane =============
# сЃџсѓцсЃ│сЂ«тѕєтЅ▓
bind \\ split-window -h
bind - split-window -v

# VimсЂ«сѓГсЃ╝сЃљсѓцсЃ│сЃЅсЂДсЃџсѓцсЃ│сѓњуД╗тІЋсЂЎсѓІ
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# =========== Plugins =============
# tmux-plugins/tmux-resurrect: tmuxсЂ«сѓ╗сЃЃсѓисЃДсЃ│сѓњС┐ЮтГўсЃ╗тЙЕтЁЃ
set -g @tpm_plugins '              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-resurrect      \
'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-processes 'nvim claude'
run-shell '~/.tmux/plugins/tpm/tpm'

